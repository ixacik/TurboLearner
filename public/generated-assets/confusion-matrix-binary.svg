<svg xmlns="http://www.w3.org/2000/svg" width="820" height="560" viewBox="0 0 820 560" role="img">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  
  <text x="340" y="55" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="900" fill="#111827">Predicted label</text>
  <text x="45" y="340" transform="rotate(-90 45 340)" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="900" fill="#111827">True label</text>
  <text x="315" y="110" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#374151">Positive</text>
  <text x="495" y="110" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#374151">Negative</text>
  <text x="125" y="210" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#374151">Positive</text>
  <text x="125" y="330" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#374151">Negative</text>
  
  <rect x="225" y="140" width="180" height="120" fill="#dcfce7" stroke="#111827" stroke-width="3"/>
  <text x="315" y="190" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#111827">TP</text>
  <text x="315" y="228" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900" fill="#111827">42</text>
  
  <rect x="405" y="140" width="180" height="120" fill="#fee2e2" stroke="#111827" stroke-width="3"/>
  <text x="495" y="190" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#111827">FN</text>
  <text x="495" y="228" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900" fill="#111827">8</text>
  
  <rect x="225" y="260" width="180" height="120" fill="#fef3c7" stroke="#111827" stroke-width="3"/>
  <text x="315" y="310" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#111827">FP</text>
  <text x="315" y="348" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900" fill="#111827">12</text>
  
  <rect x="405" y="260" width="180" height="120" fill="#dbeafe" stroke="#111827" stroke-width="3"/>
  <text x="495" y="310" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900" fill="#111827">TN</text>
  <text x="495" y="348" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900" fill="#111827">38</text>
  <text x="225" y="465" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#374151">Precision = TP / (TP + FP)</text>
  <text x="225" y="500" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#374151">Recall = TP / (TP + FN)</text>
</svg>
